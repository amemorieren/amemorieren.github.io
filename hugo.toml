baseURL = "https://amemorieren.github.io/"
title = "Blog"
theme = "stack"
defaultContentLanguage = "zh-hant-tw"

enableRobotsTXT = true
enableEmoji = true
hasCJKLanguage = true

pagination.pagerSize = 10

[languages.zh-hant-tw]
  languageCode = "zh-hant-tw"
  languageName = "正體中文"
  weight = 1
  title = "Blog"

[params]
  mainSections = ["post"]
  rssFullContent = true

  [params.sidebar]
    subtitle = "筆記"
    avatar = "img/avatar.png"
    emoji = "📖"

  [params.article]
    [params.article.license]
      enabled = false

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "taxonomy", params = { limit = 10, type = "tags", icon = "tag" } },
      { type = "taxonomy", params = { limit = 10, type = "categories", icon = "categories" } },
    ]
    page = [{ type = "toc" }]

  [params.comments]
    enabled = false

  [params.cookies]
    enabled = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4
