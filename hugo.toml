baseURL = "https://amemorieren.github.io/"
languageCode = "zh-hant-tw"
title = "Blog"
theme = "stack"

enableRobotsTXT = true
enableEmoji = true
hasCJKLanguage = true

pagination.pagerSize = 10

[params]
  mainSections = ["post"]
  rssFullContent = true

  [params.sidebar]
    subtitle = "讀書、漫畫、動畫、實況心得筆記"

  [params.article]
    [params.article.license]
      enabled = false

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

  [params.comments]
    enabled = false

  [params.cookies]
    enabled = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4
